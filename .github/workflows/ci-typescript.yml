# TypeScript language overlay for CI.
# Adapts to whichever lint+format tool was picked at gh new (Decision 4).

name: ci-typescript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-ts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: typescript (node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22"]
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29  # v4.1.7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          version: 10

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Biome path (default per Decision 4):
      - name: Lint + format check (biome)
        if: ${{ hashFiles('biome.json') != '' }}
        run: pnpm exec biome check .

      # eslint+prettier path (override):
      - name: Lint (eslint)
        if: ${{ hashFiles('.eslintrc.cjs') != '' || hashFiles('.eslintrc.js') != '' }}
        run: pnpm exec eslint --max-warnings=0 .

      - name: Format check (prettier)
        if: ${{ hashFiles('.eslintrc.cjs') != '' || hashFiles('.eslintrc.js') != '' }}
        run: pnpm exec prettier --check .

      - name: Type check (svelte-check)
        run: pnpm run check

      # IF TEST_DISCIPLINE >= pragmatic:
      - name: Tests (vitest)
        run: pnpm exec vitest run

      # IF TEST_DISCIPLINE >= strict:
      # - name: Coverage (vitest --coverage, gate >= 80%)
      #   run: pnpm exec vitest run --coverage --coverage.lines=80
